[tools]
python = '3.10'
uv = 'latest'
ruff = 'latest'

[env]
_.python.venv = { path = ".venv", create = true }

#[hooks]
# postinstall = 'uv pip install -q -r requirements.txt'

[tasks.test]
depends = ["lint"]
run = 'pytest test_dev.py -v'

[tasks.lint]
description = "Lint with ruff"
run = 'ruff check'

[tasks.fix]
description = "Fix Linting Errors"
run = 'ruff check --fix'

[tasks.pip]
description = "Reinstall pip dependencies"
run = 'uv pip install -r requirements.txt'
alias = ['dep', 'dependencies']

[tasks.test-fresh]
description = "E2E test: simulates a fresh machine running the curl one-liner in Docker"
run = """
docker run --rm ubuntu:24.04 bash -c '
  set -euo pipefail
  apt-get update -qq
  apt-get install -y -q git curl sudo
  curl -fsSL https://raw.githubusercontent.com/NoahIles/dev/master/install.sh | sh
'
"""